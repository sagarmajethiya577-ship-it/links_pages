<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>

<div id="content">Loading...</div>

<script>
function getSlug() {
    const params = new URLSearchParams(window.location.search);
    let slug = params.get("name");

    if (!slug) return null;

    // Agar .html hai to hata do
    if (slug.endsWith(".html")) {
        slug = slug.replace(".html", "");
    }

    return slug;
}

const slug = getSlug();

fetch("data.json")
.then(res => res.json())
.then(data => {
    if(slug && data[slug]) {
        document.title = data[slug].title;
        document.getElementById("content").innerHTML = data[slug].content;
    } else {
        document.getElementById("content").innerHTML = "<h1>Post Not Found</h1>";
    }
});
</script>

</body>
</html>
