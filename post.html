<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black;color:white;text-align:center;font-family:Arial">

<h2>Loading...</h2>

<script>
function getSlug() {
    const params = new URLSearchParams(window.location.search);
    let slug = params.get("name");

    if (!slug) return null;

    // agar .html hai to hata do
    if (slug.endsWith(".html")) {
        slug = slug.replace(".html", "");
    }

    return slug;
}

const slug = getSlug();

fetch("data.json")
.then(res => res.json())
.then(data => {

    if (slug && data[slug]) {

        // pura HTML replace karo
        document.open();
        document.write(data[slug].html);
        document.close();

    } else {
        document.body.innerHTML =
        "<h1 style='margin-top:50px'>❌ Post Not Found</h1>";
    }

})
.catch(error => {
    document.body.innerHTML =
    "<h1 style='margin-top:50px'>⚠ Error Loading Data</h1>";
});
</script>

</body>
</html>
