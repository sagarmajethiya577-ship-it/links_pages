<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...🚀</title>
</head>
<body>

<div id="content">Loading...</div>

<script>
function getSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get("name");
}

const slug = getSlug();

fetch("data.json")
.then(res => res.json())
.then(data => {
    if(data[slug]) {
        document.title = data[slug].title;
        document.getElementById("content").innerHTML = data[slug].content;
    } else {
        document.getElementById("content").innerHTML = "<h1>Post Not Found</h1>";
    }
});
</script>

</body>
</html>
