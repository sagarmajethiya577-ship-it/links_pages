<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Episodes Download</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    padding:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif
}
.post-wrap{
    max-width:900px;
    margin:auto;
    padding:20px
}
</style>
</head>

<body>

<div class="post-wrap">
<div id="content"></div>
</div>

<script>

function getSlug() {
    const params = new URLSearchParams(window.location.search);
    let slug = params.get("name");
    if (!slug) return null;
    if (slug.endsWith(".html")) slug = slug.replace(".html", "");
    return slug;
}

const slug = getSlug();

fetch("data1.json")
.then(res => res.json())
.then(data => {
    if(slug && data[slug]) {
        let raw = data[slug].content;
        raw = raw.replace(/<body[^>]*>/i, "").replace(/<\/body>/i, "");
        document.getElementById("content").innerHTML = raw;
    } else {
        document.getElementById("content").innerHTML =
        "<h1 style='text-align:center'>❌ Post Not Found</h1>";
    }
});

// 🔥 Back Button Redirect (1st time only)
let redirected = false;
history.pushState(null, null, location.href);
window.onpopstate = function () {
    if (!redirected) {
        redirected = true;
        window.location.href = "https://moviezone-22y.pages.dev/";
    } else {
        history.back();
    }
};

</script>

</body>
</html>
