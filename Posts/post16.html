<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Episodes Download</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body{margin:0;padding:0;background:#000;color:#fff;font-family:Arial,sans-serif}
.post-wrap{max-width:900px;margin:auto;padding:20px}
.top-note{text-align:center;margin-bottom:30px}
.top-note h1{margin:8px 0;font-size:22px}
.top-note a{color:#ff3b3b;text-decoration:none;font-weight:bold}
.box{text-align:center}
.btn{width:230px;padding:12px;margin:10px 0;font-size:14px;font-weight:bold;border:none;border-radius:6px;cursor:pointer;color:#000}
.direct{background:linear-gradient(135deg,#0ebac3,#09d261)}
.vcloud{background:linear-gradient(135deg,#ed0b0b,#f2d152)}
.pixel{background:linear-gradient(135deg,rgba(4,88,114,.82),rgba(255,99,128,.73))}
a{text-decoration:none}
</style>
</head>
<body>

<div class="post-wrap">
    <div class="top-note">
        <h1>👇 Always Use 👇</h1>
        <h1><a href="https://moviezone-22y.pages.dev/">Movies Zone 🍿</a></h1>
    </div>

    <div id="content"></div> 
</div>

<script>
// URL se 'name' parameter nikalna (Pretty URL safe)
const params = new URLSearchParams(window.location.search);
let slug = params.get("name");
if (slug) slug = slug.replace(".html", "");

// Dynamic JSON fetch karna
fetch("data16.json")
.then(res => res.json())
.then(data => {
    if(slug && data[slug]) {
        document.getElementById("content").innerHTML = data[slug].content;
    } else {
        document.getElementById("content").innerHTML = "<h1 style='text-align:center'>❌ Post Not Found</h1>";
    }
})
.catch(err => {
    console.error("Error loading JSON:", err);
    document.getElementById("content").innerHTML = "<h1 style='text-align:center'>❌ Data Load Error</h1>";
});

// Back button redirect (1st time only)
let redirected = false;
history.pushState(null, null, location.href);
window.onpopstate = function () {
    if (!redirected) {
        redirected = true;
        window.location.href = "https://omg10.com/4/7719049";
    } else {
        history.back();
    }
};
</script>
</body>
</html>
